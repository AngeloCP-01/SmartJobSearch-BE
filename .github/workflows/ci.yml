name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm
          POSTGRES_DB: jobcrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Integration tests (Jest + Supertest) run against a real Postgres; the
      # global setup applies migrations automatically. connection_limit=1 keeps
      # each Jest file's Prisma pool tiny so the serial suite can't exhaust
      # Postgres connections (the cause of intermittent cross-file failures).
      DATABASE_URL: postgresql://crm:crm@localhost:5432/jobcrm_test?schema=public&connection_limit=1
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm test
