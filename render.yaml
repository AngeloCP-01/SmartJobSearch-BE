# Render blueprint for the SmartJobSearch API (free web service).
# Postgres is hosted separately on Neon (free, persistent) — set DATABASE_URL
# to the Neon pooled connection string. Uploads go to S3-compatible object
# storage (STORAGE_DRIVER=s3) so they survive redeploys on Render's ephemeral
# disk. See DEPLOY.md for the full provisioning walkthrough.
services:
  - type: web
    name: smartjobsearch-api
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Neon pooled connection string (postgresql://...:5432/...?sslmode=require)
      - key: DATABASE_URL
        sync: false
      # Auto-generated strong secrets (Render fills these on first deploy).
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Exact frontend origin, e.g. https://smartjobsearch.vercel.app (no trailing slash).
      - key: CORS_ORIGIN
        sync: false
      # Object storage for uploads (Supabase Storage / Cloudflare R2 / S3).
      - key: STORAGE_DRIVER
        value: s3
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      # AI layer. OPENROUTER_API_KEY gates the AI features on/off (the Tailor
      # and cover-letter endpoints 503 without it) — leave unset to keep résumé
      # analysis deterministic. The model chain routes to NVIDIA first, so
      # NVIDIA_OPENAI_KEY is REQUIRED for both the fast AI chain AND RAG
      # embeddings (embeddingConfigured() === Boolean(NVIDIA_OPENAI_KEY); without
      # it, Tailor Résumé / Draft-in-Editor and doc indexing do not work).
      - key: OPENROUTER_API_KEY
        sync: false
      # Stabilized all-NVIDIA chain (2026-07-13): reliable, fast (~3-6s), no
      # timeout-prone free-tier fallbacks. Set this exact value in the dashboard.
      - key: OPENROUTER_MODEL
        value: nvidia:openai/gpt-oss-120b,nvidia:meta/llama-3.1-70b-instruct,nvidia:meta/llama-3.1-8b-instruct
      - key: NVIDIA_OPENAI_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      # RAG embeddings model (NVIDIA NIM). Has a code default; declared for clarity.
      - key: EMBEDDING_MODEL
        value: nvidia:nvidia/nv-embedqa-e5-v5
      # Public base URL of THIS API incl. /api — for absolute editor image URLs.
      - key: PUBLIC_API_URL
        sync: false
